<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>PMOS Campaign Dashboard</title>

  <link
    rel="stylesheet"
    href="dashboard.css"
  >
</head>

<body>

  <header class="topbar">

    <div>
      <strong>PMOS</strong>
      <span>Campaign Dashboard</span>
    </div>

    <button
      id="reset-data"
      class="secondary"
      type="button"
    >
      Reset demo data
    </button>

  </header>


  <main class="shell">

    <section class="hero">

      <p class="eyebrow">
        Active Campaign
      </p>

      <h1 id="campaign-name">
        Loading…
      </h1>

      <p id="campaign-meta"></p>
          <div class="summary-grid">

        <div>
          <span>Status</span>
          <strong id="campaign-status"></strong>
        </div>

        <div>
          <span>Mailboxes</span>
          <strong id="mailboxes"></strong>
        </div>

        <div>
          <span>Mail date</span>

          <strong id="mail-date">
            Not set
          </strong>
        </div>

        <div>
          <span>Revenue booked</span>

          <strong id="revenue">
            $0
          </strong>
        </div>

      </div>


      <div class="progress-row">

        <div class="progress">
          <span id="progress-fill"></span>
        </div>

        <strong id="progress-copy">
          0 / 20 committed
        </strong>

      </div>

    </section>


    <section
      class="stats"
      id="stats"
    ></section>


    <section id="inventory"></section>

  </main>


  <div
    class="modal"
    id="position-modal"
    hidden
  >

    <div class="modal-card">

      <button
        class="close"
        id="close-modal"
        type="button"
        aria-label="Close"
      >
        ×
      </button>

      <p
        class="eyebrow"
        id="modal-group"
      ></p>

      <h2 id="modal-position"></h2>

      <p id="modal-price"></p>
          <form id="position-form">

        <label>
          Status

          <select name="status">
            <option value="available">
              Available
            </option>

            <option value="reserved">
              Reserved
            </option>

            <option value="paid">
              Paid
            </option>
          </select>
        </label>


        <label>
          Category

          <input
            name="category"
            placeholder="Pizza, Coffee, Roofing…"
          >
        </label>


        <label>
          Business name

          <input name="business">
        </label>


        <label>
          Contact person

          <input name="contact">
        </label>


        <div class="two">

          <label>
            Phone

            <input
              name="phone"
              type="tel"
            >
          </label>

          <label>
            Email

            <input
              name="email"
              type="email"
            >
          </label>

        </div>


        <label>
          Website

          <input
            name="website"
            type="url"
          >
        </label>
                <div class="two">

          <label>
            Artwork

            <select name="artwork">
              <option value="pending">
                Pending
              </option>

              <option value="received">
                Received
              </option>
            </select>
          </label>


          <label>
            Proof

            <select name="proof">
              <option value="pending">
                Pending
              </option>

              <option value="sent">
                Sent
              </option>

              <option value="approved">
                Approved
              </option>

              <option value="revision">
                Revision needed
              </option>
            </select>
          </label>

        </div>


        <p
          class="warning"
          id="category-warning"
          hidden
        ></p>


        <div class="actions">

          <button
            type="button"
            class="danger"
            id="clear-position"
          >
            Clear position
          </button>

          <button
            type="submit"
            class="primary"
          >
            Save changes
          </button>

        </div>

      </form>

    </div>

  </div>


  <script src="dashboard.js"></script>

</body>
</html>
